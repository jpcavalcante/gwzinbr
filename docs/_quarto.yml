project:
  type: book
  output-dir: _book

book:
  title: "gwzinbr"
  subtitle: "Regressão Binomial Negativa Inflacionada de Zeros Geograficamente Ponderada"
  author: "Juliana M. Rosa & Douglas Mesquita"
  date: today
  repo-url: https://github.com/julianamrosa/gwzinbr
  repo-actions: [issue]
  search: true
  sidebar:
    style: docked
    background: light
  chapters:
    - index.qmd
    - part: "Referência das Funções"
      chapters:
        - 04-golden.qmd
        - 05-gwzinbr.qmd

bibliography: references.bib

format:
  html:
    theme:
      light: flatly
      dark: darkly
    code-fold: show
    code-tools: true
    toc: true
    toc-depth: 3
    number-sections: true
    fig-width: 8
    fig-height: 5
    smooth-scroll: true
    highlight-style: github

execute:
  warning: false
  message: false
  cache: true
  cache-path: _cache/
