name: Render Quarto Book → GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      - name: System dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libcurl4-openssl-dev libssl-dev libxml2-dev \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-pkgs-${{ hashFiles('.github/workflows/render-quarto.yml') }}
          restore-keys: r-pkgs-

      - name: Install R packages
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Rscript -e '
            pkgs <- c(
              "tidyverse", "MASS", "spdep", "sp",
              "rmarkdown", "knitr", "kableExtra", "broom", "dplyr",
              "ggplot2", "scales", "patchwork", "remotes"
            )
            missing <- pkgs[!pkgs %in% installed.packages()[,"Package"]]
            if (length(missing)) install.packages(missing, repos = "https://cloud.r-project.org")

            if (!"gwzinbr" %in% installed.packages()[,"Package"]) {
              remotes::install_github(
                "julianamrosa/gwzinbr",
                auth_token = Sys.getenv("GITHUB_PAT"),
                quiet      = FALSE,
                upgrade    = "never"
              )
            }
          '

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto Book
        run: quarto render docs/

      - name: Debug — show what was rendered
        run: |
          echo "=== repo root ==="
          ls -la
          echo "=== docs/ ==="
          ls -la docs/ || echo "docs/ missing"
          echo "=== docs/docs/ ==="
          ls -la docs/docs/ || echo "docs/docs/ MISSING"
          echo "=== docs/_book/ ==="
          ls -la docs/_book/ || echo "docs/_book/ MISSING"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_book

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
