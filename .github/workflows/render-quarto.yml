name: Render Quarto Book → GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      - name: System dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libcurl4-openssl-dev libssl-dev libxml2-dev \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-pkgs-${{ hashFiles('.github/workflows/render-quarto.yml') }}
          restore-keys: r-pkgs-

      - name: Install R packages
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Rscript -e '
            pkgs <- c(
              "tidyverse", "MASS", "spdep", "sp",
              "knitr", "kableExtra", "broom", "dplyr",
              "ggplot2", "scales", "patchwork", "remotes"
            )
            missing <- pkgs[!pkgs %in% installed.packages()[,"Package"]]
            if (length(missing)) install.packages(missing, repos = "https://cloud.r-project.org")

            if (!"gwzinbr" %in% installed.packages()[,"Package"]) {
              remotes::install_github(
                "julianamrosa/gwzinbr",
                auth_token = Sys.getenv("GITHUB_PAT"),
                quiet      = FALSE,
                upgrade    = "never"
              )
            }
          '

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Cache Quarto computations
        uses: actions/cache@v4
        with:
          path: docs/_cache/
          key: quarto-cache-${{ hashFiles('docs/**/*.qmd') }}
          restore-keys: quarto-cache-

      - name: Render Quarto Book
        run: quarto render docs/

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/docs
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false
